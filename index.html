<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  
  <video autoplay muted loop id="bgVideo">
  <source src="src/bg.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

  <div class="content">
  <div class="card">
    <div class="search">
      <input type="text" placeholder="Enter City Name" spellcheck="false">
      <button><img src="src/images/magnifying-glass-location-solid-full.svg" alt="">
      </button>
    </div>
    <div class="error">Invalid City Name</div>
    <div class="weather">
      <img src="src/images/rain.png" alt="" class="weather-icon">
    <h1 class="temp">22°C</h1>
    <h2 class="city">New York</h2>
    <div class="deatils">

      <div class="col">
        <img src="src/images/humidity.png" alt="No Image">
        <div>
          <p class="humidity">50%</p>
          <p>Humidity</p>
         </div>
      </div>
      

      <div class="col">
        <img src="src/images/wind.png" alt="No Image">
        <div>
          <p class="wind">15 km/hr</p>
          <p>Wind Speed</p>
        </div>
      </div>
      
    </div>
    </div>
  </div>
  </div>

  <script>
    const apikey="c41859aaa3412601566f910413859a13";
    const apiUrl="https://api.openweathermap.org/data/2.5/weather?units=metric&q=";
    const searchBox=document.querySelector(".search input");
    const searchBtn=document.querySelector(".search button");
    const weatherIcon=document.querySelector(".weather-icon");
    
    
    async function checkWeather(city) {
      const response=await fetch(apiUrl+city+`&appid=${apikey}`);
      if(response.status==404){
        document.querySelector(".error").style.display="block";
        document.querySelector(".weather").style.display="none";
      }else{
           var data=await response.json();
      
      
      document.querySelector(".city").innerHTML=data.name;
      document.querySelector(".temp").innerHTML=Math.round(data.main.temp)+"°C";
      document.querySelector(".humidity").innerHTML=data.main.humidity+"%";
      document.querySelector(".wind").innerHTML=data.wind.speed+"km/h";

      if(data.weather[0].main==="Clouds"){
        weatherIcon.src="src/images/clouds.png"
      }
     else if(data.weather[0].main==="Clear"){
        weatherIcon.src="src/images/clear.png"
      }
      else if(data.weather[0].main==="Rain"){
        weatherIcon.src="src/images/rain.png"
      }
      else if(data.weather[0].main==="Drizzle"){
        weatherIcon.src="src/images/drizzle.png"
      }
      else if(data.weather[0].main==="Mist"){
        weatherIcon.src="src/images/mist.png"
      }
      document.querySelector(".weather").style.display="block";
      document.querySelector(".error").style.display="none";
      }
      
    }
    searchBtn.addEventListener('click',()=>{
      checkWeather(searchBox.value);
    })
    
  </script>
</body>
</html>
